<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #5cc3c6, #3f7fa6);
        }

        .header {
            background: #2f6281;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            color: #3f7fa6;
        }

        h3 {
            color: #3f7fa6;
        }

        .welcome {
            margin-bottom: 10px;
            font-size: 18px;
            color: #444;
        }

        .info {
            font-size: 14px;
            color: #666;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            margin-top: 15px;
            display: none;
            border-radius: 10px;
            border: 2px solid #3f7fa6;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #3f7fa6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2f6281;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .logout {
            margin-top: 15px;
            display: inline-block;
            color: #3f7fa6;
        }
    </style>

    <script>
        function validateFile() {
            let file = document.getElementById("file").value;
            let allowed = /\.(jpg|jpeg|png)$/i;

            if (!allowed.exec(file)) {
                document.getElementById("error").innerText = "Only JPG, JPEG, PNG files allowed!";
                return false;
            }

            return true;
        }

        function previewImage(event) {
            let img = document.getElementById("preview");
            img.src = URL.createObjectURL(event.target.files[0]);
            img.style.display = "block";
        }
    </script>

</head>

<body>

    <div class="header">
        DR Detection System
    </div>

    <div class="container">

        <h2>Welcome, {{ username }}</h2>

        <h3>Upload Retina Image</h3>

        <p class="info">
            Upload a clear retinal image for accurate prediction.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="file" id="file" accept="image/*" onchange="previewImage(event)" required>

            <img id="preview">

            <div class="error">
                {% if error %}
                {{ error }}
                {% endif %}
            </div>

            <button type="submit">Upload</button>

        </form>

        <br>

        <a href="/logout" class="logout">Logout</a>

    </div>

</body>

</html>
