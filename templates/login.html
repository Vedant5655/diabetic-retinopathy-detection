<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #5cc3c6, #3f7fa6);
        }

        .container {
            width: 800px;
            margin: 80px auto;
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
        }

        .left {
            width: 40%;
            background: #2f6281;
            color: white;
            padding: 40px;
        }

        .left h2 {
            margin-bottom: 20px;
        }

        .left p {
            line-height: 1.6;
        }

        .right {
            width: 60%;
            background: white;
            padding: 40px;
        }

        h2 {
            color: #3f7fa6;
        }

        input {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #3f7fa6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2f6281;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">
            <h2>DR Detection System</h2>
            <p>
                Login to access the diabetic retinopathy detection system.
                Upload retinal images and receive instant prediction results.
            </p>

            <br><br>

            <a href="/register">
                <button>Create New Account</button>
            </a>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <h2>Login</h2>

            <form method="POST">
                <input type="text" name="user_input" placeholder="Email / Username / Name" required>
                <input type="password" name="password" placeholder="Password" required>

                <div class="error">
                    {% if error %}
                    {{ error }}
                    {% endif %}
                </div>
                <br>

                <button type="submit">Login</button>

            </form>

        </div>

    </div>

</body>

</html>
